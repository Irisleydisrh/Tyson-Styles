version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tyson_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:admin123@host.docker.internal:5432/Tyson_bd?schema=public
      JWT_SECRET: dev-jwt-secret-key-tyson-styles-2024
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: '7'
      FRONTEND_URL: http://localhost:5173
      PORT: '3001'
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

