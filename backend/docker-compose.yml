version: '3.9'

services:
  postgres:
    image: postgres:16-bookworm
    container_name: tyson_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: Tyson_bd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tyson_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@postgres:5432/Tyson_bd?schema=public
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-super-secret-key}
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_DAYS=7
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - PORT=3001
      - NODE_ENV=production
    command: sh -c "npx prisma migrate deploy && node dist/src/main"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/api/categories || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data: