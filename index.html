<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Boutique capilar para cabello rizado. Productos especializados y asesorías.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    body { font-family: 'DM Sans', sans-serif; }

    .text-gradient-teal { background: linear-gradient(135deg, #14b8a6, #0d9488); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

      </p>
      <div class="mt-6 text-sm text-gray-500">
